name: Distribute to Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: distribute-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute:
    name: Build & Distribute (Android)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (required for Android build) ─────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run tests
        run: flutter test --coverage

      # ── Secrets: dart_defines.json ────────────────────────────────────────
      - name: Create dart_defines.json
        env:
          DART_DEFINES: ${{ secrets.DART_DEFINES }}
        run: echo "$DART_DEFINES" > dart_defines.json

      # ── Secrets: Android keystore ─────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      # ── Build AAB ─────────────────────────────────────────────────────────
      - name: Build App Bundle
        run: |
          flutter build appbundle \
            --dart-define-from-file=dart_defines.json \
            --release

      # ── Upload to Firebase App Distribution ───────────────────────────────
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/bundle/release/app-release.aab
          releaseNotesFile: .github/whatsnew/whatsnew-pt-BR
