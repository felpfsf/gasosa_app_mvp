name: Release to Google Play

# Triggered only by stable release tags (e.g. v1.0.0, v1.2.3)
# Tags with suffixes like -rc1, -beta are ignored here
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release (Android → Google Play)
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (required for Android build) ─────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Read FVM config
        uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config.outputs.FLUTTER_CHANNEL }}
          cache: true

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run tests
        run: flutter test --coverage

      # ── Secrets: dart_defines.json ────────────────────────────────────────
      - name: Create dart_defines.json
        env:
          DART_DEFINES: ${{ secrets.DART_DEFINES }}
        run: echo "$DART_DEFINES" > dart_defines.json

      # ── Secrets: Android keystore ─────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      # ── Build AAB (Google Play) ────────────────────────────────────────────
      - name: Build App Bundle
        run: |
          flutter build appbundle \
            --dart-define-from-file=dart_defines.json \
            --release

      # ── Upload to Google Play Internal Track ──────────────────────────────
      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: etherealarc.tech.gasosapp
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: .github/whatsnew
