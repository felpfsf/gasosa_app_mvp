name: gasosa_app
description: "Gasosa — controle de abastecimentos e consumo do seu veículo."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  flutter_slidable: ^4.0.1
  loading_animation_widget: ^1.3.0
  top_snackbar_flutter: ^3.3.0

  # Navegação
  go_router: ^17.1.0

  # Firebase / Auth
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.1
  google_sign_in: ^7.1.1

  # Persistência local
  drift: ^2.28.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # DI
  get_it: ^9.2.0
  injectable: ^2.5.0

  # Utilitários
  meta: ^1.17.0
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.2.0
  file_picker: ^8.0.0
  validatorless: ^1.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Geração de código
  build_runner: ^2.7.0
  drift_dev: ^2.28.1
  injectable_generator: ^2.7.0

  # Ícone do app
  flutter_launcher_icons: ^0.14.3

  # Testes
  mocktail: ^1.0.4
  mockito: ^5.5.0
  faker: ^2.1.0
  matcher: ^0.12.17
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/prod.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
